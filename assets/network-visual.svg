      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".58" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#f6c453"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
      <stop offset="1" stop-color="#dff7f2" stop-opacity=".82"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#06111f" flood-opacity=".26"/>
    </filter>
  </defs>

  <rect width="960" height="640" rx="36" fill="url(#bg)"/>
