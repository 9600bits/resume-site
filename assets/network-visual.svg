<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Network and security dashboard illustration</title>
  <desc id="desc">A stylized network operations dashboard with connected nodes, security shield, and routing paths.</desc>
  <defs>
