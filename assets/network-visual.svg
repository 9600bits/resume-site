<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Modern geometric pattern</title>
  <desc id="desc">Abstract geometric shapes with gradient background</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#667eea"/>
      <stop offset="0.5" stop-color="#764ba2"/>
      <stop offset="1" stop-color="#f093fb"/>
    </linearGradient>
    <linearGradient id="shape1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#4facfe" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#00f2fe" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="shape2" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#fa709a" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#fee140" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="960" height="640" fill="url(#bg)"/>

  <!-- 装饰性几何图形 -->
  <g opacity="0.4">
    <circle cx="780" cy="120" r="180" fill="url(#shape1)"/>
    <circle cx="850" cy="450" r="140" fill="url(#shape2)"/>
    <rect x="650" y="200" width="200" height="200" rx="20" fill="url(#shape1)" transform="rotate(15 750 300)"/>
  </g>

  <!-- 网络节点装饰 -->
  <g fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3">
    <circle cx="720" cy="180" r="8"/>
    <circle cx="820" cy="240" r="8"/>
    <circle cx="780" cy="320" r="8"/>
    <circle cx="860" cy="380" r="8"/>
    <line x1="720" y1="180" x2="820" y2="240"/>
    <line x1="820" y1="240" x2="780" y2="320"/>
    <line x1="780" y1="320" x2="860" y2="380"/>
  </g>

  <!-- 代码符号装饰 -->
  <g fill="#ffffff" opacity="0.15" font-family="monospace" font-size="48" font-weight="bold">
    <text x="680" y="140">&lt;/&gt;</text>
    <text x="800" y="520">{ }</text>
  </g>

  <!-- 六边形装饰 -->
  <g fill="none" stroke="#ffffff" stroke-width="3" opacity="0.2">
    <path d="M750 420l30-17.5v-35l-30-17.5-30 17.5v35z"/>
    <path d="M850 160l40-23v-46l-40-23-40 23v46z"/>
  </g>
</svg>
