<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Cyber network topology</title>
  <desc id="desc">A dark technical network topology with routed links, nodes, and security telemetry lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1511"/>
      <stop offset="0.54" stop-color="#10231c"/>
      <stop offset="1" stop-color="#19160e"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ef5c9" stop-opacity="0"/>
      <stop offset="0.42" stop-color="#7ef5c9" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#ffb86b" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#7ef5c9" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="960" height="640" fill="url(#bg)"/>
  <rect width="960" height="640" fill="url(#grid)"/>

  <g fill="none" stroke="#d6e4dd" stroke-opacity="0.12">
    <path d="M84 120h224l72 72h176l84-84h238"/>
    <path d="M126 492h186l82-82h138l76 76h230"/>
    <path d="M218 84v138l92 92v176"/>
    <path d="M704 92v132l-86 86v220"/>
  </g>

  <g fill="none" stroke="url(#trace)" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <path d="M132 184h164l78 78h150l84-84h202"/>
    <path d="M188 444h132l72-72h168l68 68h170"/>
    <path d="M516 126l74 74v112l-74 74"/>
  </g>

  <g fill="#7ef5c9" filter="url(#glow)">
    <circle cx="132" cy="184" r="6"/>
    <circle cx="296" cy="184" r="6"/>
    <circle cx="374" cy="262" r="7"/>
    <circle cx="524" cy="262" r="6"/>
    <circle cx="608" cy="178" r="7"/>
    <circle cx="810" cy="178" r="6"/>
    <circle cx="188" cy="444" r="6"/>
    <circle cx="392" cy="372" r="7"/>
    <circle cx="628" cy="440" r="7"/>
    <circle cx="798" cy="440" r="6"/>
  </g>

  <g fill="none" stroke="#ffb86b" stroke-opacity="0.78" stroke-width="2">
    <path d="M730 268l46-27 46 27v54l-46 27-46-27z"/>
    <path d="M758 276h36v26h-36z"/>
    <path d="M767 276v-10a9 9 0 0118 0v10"/>
  </g>

  <g font-family="Consolas, monospace" font-size="16" fill="#d6e4dd" fill-opacity="0.42">
    <text x="92" y="92">ACL: PASS</text>
    <text x="642" y="92">VLAN 161</text>
    <text x="686" y="528">PBKDF2 / AES-GCM</text>
    <text x="130" y="548">DATACOM ROUTE MAP</text>
  </g>

  <g fill="#8aa4ff" fill-opacity="0.2">
    <rect x="666" y="120" width="126" height="34" rx="4"/>
    <rect x="126" y="508" width="210" height="34" rx="4"/>
    <rect x="608" y="486" width="242" height="34" rx="4"/>
  </g>
</svg>
